name: Package Magisk Module

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ---- Rust build ----
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: android-ndk-r27c
          key: ndk-r27c-v1

      - name: Download NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          rm android-ndk-r27c-linux.zip

      - name: Configure NDK toolchain
        run: |
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r27c" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$PWD/android-ndk-r27c/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV

      - name: Build Rust binary
        run: cargo build --release --target aarch64-linux-android

      # ---- WebUI build ----
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install webui dependencies
        run: npm ci
        working-directory: webui

      - name: Type-check webui
        run: npm run typecheck
        working-directory: webui

      - name: Build webui
        run: npm run build
        working-directory: webui

      # ---- Package ----
      - name: Package module
        run: |
          VERSION=$(grep '^version=' module/module.prop | cut -d= -f2)
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          mkdir -p dist
          cp target/aarch64-linux-android/release/anetd dist/
          cp -r module/* dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: anetd-${{ env.VERSION }}
          path: dist/
